product = ["copperlace notebook", "atlas builder", "story loom"]
audience = ["writer", "designer", "developer"]
benefit = ["turn rough prompts into polished variants", "ship reusable text patterns", "generate consistent labels"]
plan = ["early access", "team", "enterprise"]
quote_line = ["templates stopped feeling brittle", "our content finally had room to vary"]

headline = "{productName | titlecase} for {audience | pluralize | titlecase}"
