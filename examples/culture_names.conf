environment = ["desert", "forest", "mountain", "coastal", "arctic"]
social_structure = ["tribal", "feudal", "merchant-based", "nomadic"]
value = ["honor", "knowledge", "nature", "trade", "war"]
technology = ["stone age", "bronze age", "industrial"]

occupation = ["smith", "baker", "hunter", "scribe", "sailor"]
geography = ["hill", "river", "northwood", "ash coast", "frost ridge"]
ancestor = ["Joran", "Mira", "Valen", "Kost", "Arel"]
trait = ["swift", "ironhand", "goldbeard", "keeneye", "stormborn"]
settlement_kind = ["hold", "port", "camp", "forge", "market"]

nordic {
  vowel = ["ö", "å", "ä", "yr", "ei"]
  consonant = ["sk", "bj", "th", "vr", "kn"]
  ending = ["gard", "heim", "vik", "dottir", "sson"]

  syllable = "{nordic.consonant}{nordic.vowel}"
  first = ["{nordic.syllable}{nordic.ending}", "{nordic.syllable}{nordic.syllable}"]
  family = ["{ancestor}{nordic.ending}", "{trait | titlecase}", "{geography | titlecase}{settlement_kind | titlecase}"]
  place = ["{nordic.syllable}{nordic.ending}", "{geography | titlecase}{settlement_kind | titlecase}"]
  culture = "{givenName:nordic.first | titlecase}{familyName:nordic.family}{homePlace:nordic.place | titlecase}Nordic-inspired {cultureEnvironment} culture. Its people are {cultureStructure}, value {cultureValue}, and work with {cultureTechnology} tools. Sample names: {givenName} {familyName}; from {homePlace}."
}

mediterranean {
  vowel = ["a", "e", "ia", "io", "ae"]
  consonant = ["l", "r", "m", "n", "v"]
  ending = ["a", "io", "ena", "ara", "os"]

  syllable = "{mediterranean.consonant}{mediterranean.vowel}"
  first = ["{mediterranean.syllable}{mediterranean.ending}", "{mediterranean.syllable}{mediterranean.syllable}{mediterranean.ending}"]
  family = ["de {geography | titlecase}", "{occupation | titlecase}{mediterranean.ending}", "{ancestor}{mediterranean.ending}"]
  place = ["{mediterranean.syllable}{mediterranean.syllable}{mediterranean.ending}", "{geography | titlecase} {settlement_kind | titlecase}"]
  culture = "{givenName:mediterranean.first | titlecase}{familyName:mediterranean.family}{homePlace:mediterranean.place | titlecase}Mediterranean-inspired {cultureEnvironment} culture. Its people are {cultureStructure}, value {cultureValue}, and work with {cultureTechnology} tools. Sample names: {givenName} {familyName}; from {homePlace}."
}

slavic {
  vowel = ["a", "o", "u", "i"]
  cluster = ["br", "dr", "kr", "vl", "zv"]
  ending = ["ov", "ek", "mir", "ska", "grad"]

  syllable = "{slavic.cluster}{slavic.vowel}"
  first = ["{slavic.syllable}{slavic.ending}", "{slavic.syllable}{slavic.syllable}"]
  family = ["{ancestor}{slavic.ending}", "{occupation | titlecase}{slavic.ending}", "{trait | titlecase}{slavic.ending}"]
  place = ["{slavic.syllable}{slavic.ending}", "{geography | titlecase}{slavic.ending}"]
  culture = "{givenName:slavic.first | titlecase}{familyName:slavic.family}{homePlace:slavic.place | titlecase}Slavic-inspired {cultureEnvironment} culture. Its people are {cultureStructure}, value {cultureValue}, and work with {cultureTechnology} tools. Sample names: {givenName} {familyName}; from {homePlace}."
}

first_name = ["{nordic.first | titlecase}", "{mediterranean.first | titlecase}", "{slavic.first | titlecase}"]
family_name = ["{nordic.family}", "{mediterranean.family}", "{slavic.family}"]
place_name = ["{nordic.place | titlecase}", "{mediterranean.place | titlecase}", "{slavic.place | titlecase}"]

origin = "{cultureEnvironment:environment}{cultureStructure:social_structure}{cultureValue:value}{cultureTechnology:technology}{culture}"
culture = ["{nordic.culture}", "{mediterranean.culture}", "{slavic.culture}"]
