male_name = ["Arjun", "Theo"]
female_name = ["Mia", "Lina"]
lizard_name = ["Pip", "Scale"]

male_subject = "he"
male_object = "him"
male_possessive = "his"
male_reflexive = "himself"

female_subject = "she"
female_object = "her"
female_possessive = "her"
female_reflexive = "herself"

lizard_subject = "it"
lizard_object = "it"
