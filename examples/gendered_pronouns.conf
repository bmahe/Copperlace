character = [
  "{% hero:male_name %}{% subject:male_subject %}{% object:male_object %}{% possessive:male_possessive %}{% reflexive:male_reflexive %}",
  "{% hero:female_name %}{% subject:female_subject %}{% object:female_object %}{% possessive:female_possessive %}{% reflexive:female_reflexive %}",
  "{% hero:lizard_name %}{% subject:lizard_subject %}{% object:lizard_object %}{% possessive:lizard_possessive %}{% reflexive:lizard_reflexive %}"
]

location = ["market", "library", "watchtower"]
item = ["lantern", "map", "satchel"]
action = ["search", "hide", "guard"]

origin = "{character}{hero} entered the {location} with {possessive} {item}. {subject | sentence} kept the door behind {object} clear while {action | present_participle}, and trusted {reflexive} to notice trouble."

profile = "{character}{hero}: {subject}/{object}/{possessive}/{reflexive}"
