material = ["moonstone", "iron", "silver", "glass"]
history = ["guard", "save", "find", "catch"]
effect = ["spark", "ember", "shield", "whisper"]
use = ["search", "run", "guide", "watch"]
level = [1, 2, 3, 11]
charges = [2, 3, 4]
