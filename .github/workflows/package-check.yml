name: Package Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  versions:
    name: Version metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_versions.py

  python-wheel:
    name: Python wheel (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python build tooling
        run: python -m pip install build
      - name: Install Linux wheel repair tooling
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install auditwheel
      - name: Build wheel
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            python -m build --wheel --outdir dist/raw
            python -m auditwheel repair dist/raw/*.whl --wheel-dir dist
          else
            python -m build --wheel
          fi
        working-directory: python
      - name: Smoke-test wheel
        shell: bash
        run: python scripts/smoke_python_wheel.py python/dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: python/dist/*.whl

  python-sdist:
    name: Python sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Python build tooling
        run: python -m pip install build
      - name: Build sdist
        run: python -m build --sdist
        working-directory: python
      - name: Smoke-test sdist
        shell: bash
        run: python scripts/smoke_python_artifact.py python/dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: python/dist/*.tar.gz

  java-package:
    name: Java package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            classifier: linux-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Java jars
        shell: bash
        run: |
          cargo build --release --manifest-path rust-core/Cargo.toml
          python scripts/stage_java_native.py --classifier "${{ matrix.classifier }}"
          mvn -q -P"${{ matrix.classifier }}" package -f java/pom.xml
      - name: Smoke-test Java jars
        shell: bash
        run: |
          VERSION=$(python scripts/check_versions.py)
          API_JAR="java/api/target/copperlace-api-${VERSION}.jar"
          NATIVE_JAR="java/native/${{ matrix.classifier }}/target/copperlace-${{ matrix.classifier }}-${VERSION}.jar"
          python scripts/smoke_java_artifacts.py --api-jar "$API_JAR" --native-jar "$NATIVE_JAR"
      - uses: actions/upload-artifact@v4
        with:
          name: java-jars-${{ matrix.target }}
          path: |
            java/api/target/*.jar
            java/native/${{ matrix.classifier }}/target/*.jar

  cli-archive:
    name: CLI archive (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust release
        run: cargo build --release --manifest-path rust-core/Cargo.toml
      - name: Package CLI archive
        run: python scripts/package_cli.py --output-dir dist
      - name: Smoke-test CLI archive
        shell: bash
        run: python scripts/smoke_cli_archive.py dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: cli-archive-${{ matrix.target }}
          path: dist/*

  js-package:
    name: JS/WASM package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build JS package
        run: make js-package
      - name: Pack JS package
        run: |
          mkdir -p dist
          cp LICENSE js/pkg/LICENSE
          npm pack ./js/pkg --pack-destination dist
      - name: Smoke-test JS package
        run: python scripts/smoke_js_package.py dist/*.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: js-package
          path: dist/*.tgz
