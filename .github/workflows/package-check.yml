name: Package Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  versions:
    name: Version metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_versions.py

  python-wheel:
    name: Python wheel (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-x86_64
            runner: macos-15-intel
          - target: macos-aarch64
            runner: macos-15
          - target: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheel
        run: python -m build --wheel
        working-directory: python
      - name: Smoke-test wheel
        shell: bash
        run: python scripts/smoke_python_wheel.py python/dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.target }}
          path: python/dist/*.whl

  java-package:
    name: Java package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
            classifier: linux-x86_64
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
            classifier: linux-aarch64
          - target: macos-x86_64
            runner: macos-15-intel
            classifier: macos-x86_64
          - target: macos-aarch64
            runner: macos-15
            classifier: macos-aarch64
          - target: windows-x86_64
            runner: windows-2022
            classifier: windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Java jars
        run: mvn -q package
        working-directory: java
      - name: Smoke-test Java jars
        shell: bash
        run: |
          VERSION=$(python scripts/check_versions.py)
          BASE_JAR="java/target/copperlace-${VERSION}.jar"
          NATIVE_JAR="java/target/copperlace-${VERSION}-${{ matrix.classifier }}.jar"
          python scripts/smoke_java_artifacts.py --base-jar "$BASE_JAR" --native-jar "$NATIVE_JAR"
      - uses: actions/upload-artifact@v4
        with:
          name: java-jars-${{ matrix.target }}
          path: java/target/*.jar

  cli-archive:
    name: CLI archive (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-24.04
          - target: linux-aarch64
            runner: ubuntu-24.04-arm
          - target: macos-x86_64
            runner: macos-15-intel
          - target: macos-aarch64
            runner: macos-15
          - target: windows-x86_64
            runner: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust release
        run: cargo build --release --manifest-path rust-core/Cargo.toml
      - name: Package CLI archive
        run: python scripts/package_cli.py --output-dir dist
      - name: Smoke-test CLI archive
        shell: bash
        run: python scripts/smoke_cli_archive.py dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: cli-archive-${{ matrix.target }}
          path: dist/*

  js-package:
    name: JS/WASM package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build JS package
        run: make js-package
      - name: Pack JS package
        run: |
          mkdir -p dist
          cp LICENSE js/pkg/LICENSE
          npm pack ./js/pkg --pack-destination dist
      - name: Smoke-test JS package
        run: python scripts/smoke_js_package.py dist/*.tgz
      - uses: actions/upload-artifact@v4
        with:
          name: js-package
          path: dist/*.tgz
